<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="left">
        <div class="logo">
            <img src="img/odin-lined.png" alt="The odin project logo">
            <h1>ODIN</h1>
        </div>
        <div>
            Foto de <a href="https://unsplash.com/es/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> en <a href="https://unsplash.com/es/fotos/planta-de-hoja-verde-en-fotografia-de-primer-plano-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
        </div>
    </div>

    <div class="right">
        <div class="text">
            <p>This is not a real online service! You know you need something <br> like this in your life to help you realize your deepest dreams.<br>Sign up <span>now</span> to get started.</p>
            <p>You <span>know</span> you want to.</p>
        </div>

        <div class="form">
            <h1>Let's do this!</h1>
            <form>
                <div class="form-row">
                    <div class="form-field">
                        <label for="fname">FIRST NAME</label>
                        <input type="text" name="fname" id="fname">
                    </div>
                    <div class="form-field">
                        <label for="lname">LAST NAME</label>
                        <input type="text" name="lname" id="lname">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label for="email">EMAIL</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div class="form-field">
                        <label for="phone-number">PHONE NUMBER</label>
                        <input type="tel" name="phone-number" id="phone-number">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label for="password">PASSWORD</label>
                        <input type="password" name="password" id="password">
                    </div>
                    <div class="form-field">
                        <label for="confirm-password">CONFIRM PASSWORD</label>
                        <input type="password" name="confirm-password" id="confirm-password">
                    </div>
                </div>
            </form>
        </div>

        <div class="create">
            <button>Create Account</button>
            <p>Already have an account? <span>Log in</span></p>
        </div>
    </div>      
</body>
</html>
